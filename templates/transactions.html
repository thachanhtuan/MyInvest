{% extends "base.html" %}
{% block title %}Транзакции{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Транзакции</h2>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#txModal" onclick="openCreateTx()">
    <i class="bi bi-plus-lg me-1"></i>Добавить
  </button>
</div>

<!-- Filters -->
<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">
    <div class="row g-2">
      <div class="col-md-2">
        <input class="form-control form-control-sm" id="f-account" placeholder="Счёт" onchange="loadTx()"/>
      </div>
      <div class="col-md-2">
        <input class="form-control form-control-sm" id="f-ticker" placeholder="Тикер" onchange="loadTx()"/>
      </div>
      <div class="col-md-2">
        <select class="form-select form-select-sm" id="f-type" onchange="loadTx()">
          <option value="">Все типы</option>
          <option value="buy">buy</option><option value="sell">sell</option>
          <option value="dividend">dividend</option><option value="coupon">coupon</option>
          <option value="amortization">amortization</option><option value="maturity">maturity</option>
          <option value="commission">commission</option><option value="tax">tax</option>
          <option value="deposit_in">deposit_in</option><option value="deposit_out">deposit_out</option>
          <option value="interest">interest</option><option value="initial_balance">initial_balance</option>
          <option value="other">other</option>
        </select>
      </div>
      <div class="col-md-2">
        <input type="date" class="form-control form-control-sm" id="f-from" onchange="loadTx()"/>
      </div>
      <div class="col-md-2">
        <input type="date" class="form-control form-control-sm" id="f-to" onchange="loadTx()"/>
      </div>
      <div class="col-md-2">
        <button class="btn btn-sm btn-outline-secondary w-100" onclick="resetFilters()">Сбросить</button>
      </div>
    </div>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body table-responsive">
    <table class="table table-sm table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>#</th><th>Дата</th><th>Счёт</th><th>Тикер</th><th>Тип</th>
          <th>Кол-во</th><th>Цена</th><th>НКД</th><th>Комиссия</th><th>Итого</th><th>Валюта</th><th></th>
        </tr>
      </thead>
      <tbody id="tx-table"></tbody>
    </table>
  </div>
</div>

<!-- Transaction Modal -->
<div class="modal fade" id="txModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="txModalTitle">Транзакция</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="txForm">
          <input type="hidden" id="tx-mode"/>
          <input type="hidden" id="tx-id"/>
          <div class="row g-3">
            <div class="col-md-2"><label class="form-label">Дата *</label>
              <input type="date" class="form-control" id="tx-date" required/></div>
            <div class="col-md-2"><label class="form-label">Счёт *</label>
              <input class="form-control" id="tx-account" required/></div>
            <div class="col-md-2"><label class="form-label">Тикер *</label>
              <input class="form-control" id="tx-ticker" required/></div>
            <div class="col-md-2"><label class="form-label">Тип *</label>
              <select class="form-select" id="tx-type">
                <option value="buy">buy</option><option value="sell">sell</option>
                <option value="dividend">dividend</option><option value="coupon">coupon</option>
                <option value="amortization">amortization</option><option value="maturity">maturity</option>
                <option value="commission">commission</option><option value="tax">tax</option>
                <option value="deposit_in">deposit_in</option><option value="deposit_out">deposit_out</option>
                <option value="interest">interest</option><option value="initial_balance">initial_balance</option>
                <option value="other">other</option>
              </select></div>
            <div class="col-md-2"><label class="form-label">Кол-во</label>
              <input type="number" step="any" class="form-control" id="tx-qty"/></div>
            <div class="col-md-2"><label class="form-label">Цена</label>
              <input type="number" step="any" class="form-control" id="tx-price"/></div>
            <div class="col-md-2"><label class="form-label">Сумма</label>
              <input type="number" step="any" class="form-control" id="tx-amount"/></div>
            <div class="col-md-2"><label class="form-label">НКД</label>
              <input type="number" step="any" class="form-control" id="tx-nkd"/></div>
            <div class="col-md-2"><label class="form-label">Комиссия</label>
              <input type="number" step="any" class="form-control" id="tx-commission"/></div>
            <div class="col-md-2"><label class="form-label">Итого</label>
              <input type="number" step="any" class="form-control" id="tx-total"/></div>
            <div class="col-md-2"><label class="form-label">Валюта</label>
              <input class="form-control" id="tx-currency" placeholder="RUB"/></div>
            <div class="col-md-2"><label class="form-label">Брокер</label>
              <input class="form-control" id="tx-broker"/></div>
            <div class="col-md-12"><label class="form-label">Примечание</label>
              <input class="form-control" id="tx-notes"/></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button class="btn btn-primary" onclick="saveTx()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal fade" id="deleteTxModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Удалить транзакцию?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Вы уверены?</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Нет</button>
        <button class="btn btn-danger" id="confirmDeleteTxBtn">Удалить</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let txList = [];
const fmt = v => v==null?'—':new Intl.NumberFormat('ru-RU',{maximumFractionDigits:4}).format(v);

function resetFilters() {
  ['f-account','f-ticker','f-type','f-from','f-to'].forEach(id=>{ document.getElementById(id).value=''; });
  loadTx();
}

async function loadTx() {
  const params = new URLSearchParams({limit:200});
  const acc = document.getElementById('f-account').value.trim();
  const ticker = document.getElementById('f-ticker').value.trim();
  const type = document.getElementById('f-type').value;
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  if (acc) params.set('account_id', acc);
  if (ticker) params.set('ticker', ticker);
  if (type) params.set('tx_type', type);
  if (from) params.set('from_date', from);
  if (to) params.set('to_date', to);
  txList = await fetch('/api/transactions?'+params).then(r=>r.json()).catch(()=>[]);
  renderTx();
}

function renderTx() {
  const tbody = document.getElementById('tx-table');
  tbody.innerHTML = '';
  txList.forEach(t => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${t.id}</td><td>${t.date}</td><td>${t.account_id}</td>
      <td><strong>${t.ticker}</strong></td><td><span class="badge bg-secondary">${t.tx_type}</span></td>
      <td>${fmt(t.quantity)}</td><td>${fmt(t.price)}</td><td>${fmt(t.nkd)}</td>
      <td>${fmt(t.commission)}</td><td>${fmt(t.total_amount||t.amount)}</td><td>${t.currency||'—'}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditTx(${t.id})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="confirmDeleteTx(${t.id})"><i class="bi bi-trash"></i></button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function openCreateTx() {
  document.getElementById('txModalTitle').textContent = 'Новая транзакция';
  document.getElementById('tx-mode').value = 'create';
  document.getElementById('txForm').reset();
  document.getElementById('tx-date').value = new Date().toISOString().slice(0,10);
}

function openEditTx(id) {
  const t = txList.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('txModalTitle').textContent = 'Редактировать транзакцию';
  document.getElementById('tx-mode').value = 'edit';
  document.getElementById('tx-id').value = t.id;
  document.getElementById('tx-date').value = t.date;
  document.getElementById('tx-account').value = t.account_id;
  document.getElementById('tx-ticker').value = t.ticker;
  document.getElementById('tx-type').value = t.tx_type;
  document.getElementById('tx-qty').value = t.quantity??'';
  document.getElementById('tx-price').value = t.price??'';
  document.getElementById('tx-amount').value = t.amount??'';
  document.getElementById('tx-nkd').value = t.nkd??'';
  document.getElementById('tx-commission').value = t.commission??'';
  document.getElementById('tx-total').value = t.total_amount??'';
  document.getElementById('tx-currency').value = t.currency??'';
  document.getElementById('tx-broker').value = t.broker??'';
  document.getElementById('tx-notes').value = t.notes??'';
  new bootstrap.Modal(document.getElementById('txModal')).show();
}

const numOrNull = v => { const n=parseFloat(v); return isNaN(n)?null:n; };

async function saveTx() {
  const mode = document.getElementById('tx-mode').value;
  const id = document.getElementById('tx-id').value;
  const body = {
    date: document.getElementById('tx-date').value,
    account_id: document.getElementById('tx-account').value.trim(),
    ticker: document.getElementById('tx-ticker').value.trim(),
    tx_type: document.getElementById('tx-type').value,
    quantity: numOrNull(document.getElementById('tx-qty').value),
    price: numOrNull(document.getElementById('tx-price').value),
    amount: numOrNull(document.getElementById('tx-amount').value),
    nkd: numOrNull(document.getElementById('tx-nkd').value),
    commission: numOrNull(document.getElementById('tx-commission').value),
    total_amount: numOrNull(document.getElementById('tx-total').value),
    currency: document.getElementById('tx-currency').value.trim()||null,
    broker: document.getElementById('tx-broker').value.trim()||null,
    notes: document.getElementById('tx-notes').value.trim()||null,
  };
  const url = mode==='create' ? '/api/transactions' : `/api/transactions/${id}`;
  const method = mode==='create' ? 'POST' : 'PUT';
  const res = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if (res.ok) {
    bootstrap.Modal.getInstance(document.getElementById('txModal')).hide();
    loadTx();
  } else {
    const err = await res.json();
    alert(err.detail||'Ошибка');
  }
}

function confirmDeleteTx(id) {
  const btn = document.getElementById('confirmDeleteTxBtn');
  btn.onclick = async () => {
    await fetch(`/api/transactions/${id}`, {method:'DELETE'});
    bootstrap.Modal.getInstance(document.getElementById('deleteTxModal')).hide();
    loadTx();
  };
  new bootstrap.Modal(document.getElementById('deleteTxModal')).show();
}

loadTx();
</script>
{% endblock %}
