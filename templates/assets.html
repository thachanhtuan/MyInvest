{% extends "base.html" %}
{% block title %}Активы{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Активы</h2>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#assetModal" onclick="openCreateAsset()">
    <i class="bi bi-plus-lg me-1"></i>Добавить актив
  </button>
</div>

<div class="mb-3 d-flex gap-2 flex-wrap">
  <select class="form-select w-auto" id="filter-class" onchange="loadAssets()">
    <option value="">Все классы</option>
    <option value="stock_ru">Акции RU</option>
    <option value="stock_foreign">Акции иностр.</option>
    <option value="bond_gov">ОФЗ</option>
    <option value="bond_corp">Корп. облигации</option>
    <option value="bond_muni">Муниц. облигации</option>
    <option value="etf">ETF/БПИФ</option>
    <option value="deposit">Депозит</option>
    <option value="cash">Кэш</option>
    <option value="gold">Золото</option>
    <option value="other">Другое</option>
  </select>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>Тикер</th><th>Название</th><th>Класс</th><th>Кол-во</th>
          <th>Ср. цена</th><th>Рын. стоимость</th><th>P&amp;L</th><th>P&amp;L%</th><th></th>
        </tr>
      </thead>
      <tbody id="assets-table"></tbody>
    </table>
  </div>
</div>

<!-- Asset Modal -->
<div class="modal fade" id="assetModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="assetModalTitle">Актив</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="assetForm">
          <input type="hidden" id="asset-mode"/>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Тикер *</label>
              <input class="form-control" id="asset-ticker" required/>
            </div>
            <div class="col-md-8">
              <label class="form-label">Название *</label>
              <input class="form-control" id="asset-name" required/>
            </div>
            <div class="col-md-4">
              <label class="form-label">Класс актива *</label>
              <select class="form-select" id="asset-class">
                <option value="stock_ru">Акции RU</option>
                <option value="stock_foreign">Акции иностр.</option>
                <option value="bond_gov">ОФЗ</option>
                <option value="bond_corp">Корп. облигации</option>
                <option value="bond_muni">Муниц. облигации</option>
                <option value="etf">ETF/БПИФ</option>
                <option value="deposit">Депозит</option>
                <option value="cash">Кэш</option>
                <option value="gold">Золото</option>
                <option value="other">Другое</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Валюта</label>
              <input class="form-control" id="asset-currency" placeholder="RUB"/>
            </div>
            <div class="col-md-4">
              <label class="form-label">ISIN</label>
              <input class="form-control" id="asset-isin"/>
            </div>
            <div class="col-12">
              <label class="form-label">Примечание</label>
              <textarea class="form-control" id="asset-notes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button class="btn btn-primary" onclick="saveAsset()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal fade" id="deleteAssetModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Удалить актив?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Вы уверены?</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Нет</button>
        <button class="btn btn-danger" id="confirmDeleteAssetBtn">Удалить</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let assets = [];
let portfolioValue = {};

async function loadAssets() {
  const cls = document.getElementById('filter-class').value;
  const url = cls ? `/api/assets?asset_class=${cls}` : '/api/assets';
  assets = await fetch(url).then(r=>r.json()).catch(()=>[]);
  portfolioValue = await fetch('/api/analytics/portfolio-value').then(r=>r.json()).catch(()=>({}));
  renderAssets();
}

const fmt = v => v==null?'—':new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(v);
const fmtPct = v => v==null?'—':v.toFixed(2)+'%';

function renderAssets() {
  const tbody = document.getElementById('assets-table');
  tbody.innerHTML = '';
  assets.forEach(a => {
    const pv = portfolioValue[a.ticker];
    const qty = pv?.quantity;
    const avgCost = pv?.avg_cost;
    const mv = pv?.market_value;
    const pnl = pv?.unrealized_pnl;
    const pnlPct = pv?.unrealized_pnl_pct;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><strong>${a.ticker}</strong></td><td>${a.name}</td><td><span class="badge bg-secondary">${a.asset_class}</span></td>
      <td>${fmt(qty)}</td><td>${fmt(avgCost)}</td><td>${fmt(mv)}</td>
      <td class="${(pnl||0)>=0?'text-success':'text-danger'}">${fmt(pnl)}</td>
      <td class="${(pnlPct||0)>=0?'text-success':'text-danger'}">${fmtPct(pnlPct)}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditAsset('${a.ticker}')"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="confirmDeleteAsset('${a.ticker}')"><i class="bi bi-trash"></i></button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function openCreateAsset() {
  document.getElementById('assetModalTitle').textContent = 'Новый актив';
  document.getElementById('asset-mode').value = 'create';
  document.getElementById('assetForm').reset();
  document.getElementById('asset-ticker').disabled = false;
}

function openEditAsset(ticker) {
  const a = assets.find(x=>x.ticker===ticker);
  if (!a) return;
  document.getElementById('assetModalTitle').textContent = 'Редактировать актив';
  document.getElementById('asset-mode').value = 'edit';
  document.getElementById('asset-ticker').value = a.ticker;
  document.getElementById('asset-ticker').disabled = true;
  document.getElementById('asset-name').value = a.name;
  document.getElementById('asset-class').value = a.asset_class;
  document.getElementById('asset-currency').value = a.currency||'';
  document.getElementById('asset-isin').value = a.isin||'';
  document.getElementById('asset-notes').value = a.notes||'';
  new bootstrap.Modal(document.getElementById('assetModal')).show();
}

async function saveAsset() {
  const mode = document.getElementById('asset-mode').value;
  const ticker = document.getElementById('asset-ticker').value.trim();
  const body = {
    ticker,
    name: document.getElementById('asset-name').value.trim(),
    asset_class: document.getElementById('asset-class').value,
    currency: document.getElementById('asset-currency').value.trim()||null,
    isin: document.getElementById('asset-isin').value.trim()||null,
    notes: document.getElementById('asset-notes').value.trim()||null,
  };
  const url = mode==='create' ? '/api/assets' : `/api/assets/${ticker}`;
  const method = mode==='create' ? 'POST' : 'PUT';
  const res = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if (res.ok) {
    bootstrap.Modal.getInstance(document.getElementById('assetModal')).hide();
    loadAssets();
  } else {
    const err = await res.json();
    alert(err.detail||'Ошибка');
  }
}

function confirmDeleteAsset(ticker) {
  const btn = document.getElementById('confirmDeleteAssetBtn');
  btn.onclick = async () => {
    await fetch(`/api/assets/${ticker}`, {method:'DELETE'});
    bootstrap.Modal.getInstance(document.getElementById('deleteAssetModal')).hide();
    loadAssets();
  };
  new bootstrap.Modal(document.getElementById('deleteAssetModal')).show();
}

loadAssets();
</script>
{% endblock %}
