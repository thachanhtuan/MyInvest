{% extends "base.html" %}
{% block title %}Аналитика{% endblock %}

{% block content %}
<h2 class="mb-4">Аналитика</h2>

<!-- Returns summary -->
<div class="row g-3 mb-4" id="returns-cards">
  <div class="col-md-3">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="text-muted small">Вложено</div>
        <div class="fs-5 fw-bold" id="r-invested">—</div>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="text-muted small">Текущая стоимость</div>
        <div class="fs-5 fw-bold text-primary" id="r-value">—</div>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="text-muted small">Прибыль</div>
        <div class="fs-5 fw-bold" id="r-return">—</div>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="text-muted small">Доходность</div>
        <div class="fs-5 fw-bold" id="r-return-pct">—</div>
      </div>
    </div>
  </div>
</div>

<div class="row g-3 mb-4">
  <!-- Allocation -->
  <div class="col-md-5">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body">
        <h5 class="card-title">Аллокация по классам</h5>
        <canvas id="allocChart" height="300"></canvas>
      </div>
    </div>
  </div>

  <!-- Bond ladder -->
  <div class="col-md-7">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body">
        <h5 class="card-title">Bond Ladder (по годам)</h5>
        <canvas id="ladderChart" height="300"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- Coupon schedule -->
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <h5 class="card-title">Ожидаемые купоны (12 мес.)</h5>
    <div class="table-responsive">
      <table class="table table-sm table-hover">
        <thead><tr><th>Дата</th><th>Тикер</th><th>Сумма</th><th>Валюта</th></tr></thead>
        <tbody id="coupon-schedule-table"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const fmt = v => v==null?'—':new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(v);
const fmtPct = v => v==null?'—':v.toFixed(2)+'%';

async function loadAnalytics() {
  const [ret, alloc, ladder, coupons] = await Promise.all([
    fetch('/api/analytics/returns').then(r=>r.json()).catch(()=>({})),
    fetch('/api/analytics/allocation').then(r=>r.json()).catch(()=>({})),
    fetch('/api/analytics/bond-ladder').then(r=>r.json()).catch(()=>[]),
    fetch('/api/analytics/coupon-schedule?months_ahead=12').then(r=>r.json()).catch(()=>[]),
  ]);

  // Returns
  document.getElementById('r-invested').textContent = fmt(ret.total_invested);
  document.getElementById('r-value').textContent = fmt(ret.current_value);
  const rEl = document.getElementById('r-return');
  rEl.textContent = fmt(ret.total_return);
  rEl.className = 'fs-5 fw-bold ' + ((ret.total_return||0)>=0?'text-success':'text-danger');
  const rpEl = document.getElementById('r-return-pct');
  rpEl.textContent = fmtPct(ret.total_return_pct);
  rpEl.className = 'fs-5 fw-bold ' + ((ret.total_return_pct||0)>=0?'text-success':'text-danger');

  // Allocation chart
  const aLabels = Object.keys(alloc);
  const aValues = aLabels.map(k=>alloc[k].value);
  new Chart(document.getElementById('allocChart').getContext('2d'), {
    type: 'pie',
    data: { labels: aLabels, datasets: [{ data: aValues }] },
    options: { plugins: { legend: { position: 'bottom' } } }
  });

  // Bond ladder
  const yearMap = {};
  ladder.forEach(r => { yearMap[r.year] = (yearMap[r.year]||0) + r.amount; });
  const years = Object.keys(yearMap).sort();
  new Chart(document.getElementById('ladderChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: years,
      datasets: [{ label: 'Номинал к погашению', data: years.map(y=>yearMap[y]), backgroundColor: 'rgba(54,162,235,0.7)' }]
    },
    options: { scales: { y: { beginAtZero: true } } }
  });

  // Coupon schedule table
  const tbody = document.getElementById('coupon-schedule-table');
  coupons.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${c.date}</td><td>${c.ticker}</td><td>${fmt(c.amount)}</td><td>${c.currency}</td>`;
    tbody.appendChild(tr);
  });
}

loadAnalytics();
</script>
{% endblock %}
