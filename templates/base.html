<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MyInvest – {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- Sidebar -->
<div class="d-flex" id="wrapper">
  <nav id="sidebar" class="bg-dark text-white p-3 d-flex flex-column" style="min-width:220px;min-height:100vh;">
    <div class="mb-4">
      <a href="/" class="text-white text-decoration-none fs-4 fw-bold">
        <i class="bi bi-graph-up-arrow me-2"></i>MyInvest
      </a>
    </div>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a href="/" class="nav-link text-white {% if request.url.path == '/' %}active bg-secondary rounded{% endif %}">
          <i class="bi bi-speedometer2 me-2"></i>Дашборд
        </a>
      </li>
      <li class="nav-item">
        <a href="/accounts" class="nav-link text-white {% if '/accounts' in request.url.path %}active bg-secondary rounded{% endif %}">
          <i class="bi bi-wallet2 me-2"></i>Счета
        </a>
      </li>
      <li class="nav-item">
        <a href="/assets" class="nav-link text-white {% if '/assets' in request.url.path %}active bg-secondary rounded{% endif %}">
          <i class="bi bi-bar-chart-line me-2"></i>Активы
        </a>
      </li>
      <li class="nav-item">
        <a href="/transactions" class="nav-link text-white {% if '/transactions' in request.url.path %}active bg-secondary rounded{% endif %}">
          <i class="bi bi-arrow-left-right me-2"></i>Транзакции
        </a>
      </li>
      <li class="nav-item">
        <a href="/analytics" class="nav-link text-white {% if '/analytics' in request.url.path %}active bg-secondary rounded{% endif %}">
          <i class="bi bi-pie-chart me-2"></i>Аналитика
        </a>
      </li>
      <li class="nav-item">
        <a href="/bonds" class="nav-link text-white {% if '/bonds' in request.url.path %}active bg-secondary rounded{% endif %}">
          <i class="bi bi-cash-stack me-2"></i>Облигации
        </a>
      </li>
      <li class="nav-item">
        <a href="/import-export" class="nav-link text-white {% if '/import-export' in request.url.path %}active bg-secondary rounded{% endif %}">
          <i class="bi bi-file-earmark-spreadsheet me-2"></i>Импорт/Экспорт
        </a>
      </li>
    </ul>
  </nav>

  <!-- Page Content -->
  <div id="page-content" class="flex-grow-1 p-4 bg-light">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
