<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MyInvest{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <nav id="sidebar" class="bg-dark text-white p-3" style="width: 240px; min-height: 100vh;">
      <h5 class="mb-4">
        <i class="bi bi-graph-up-arrow"></i> MyInvest
      </h5>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link text-white {% if request.url.path == '/' %}active bg-secondary rounded{% endif %}" href="/">
            <i class="bi bi-speedometer2"></i> Дашборд
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {% if '/accounts' in request.url.path %}active bg-secondary rounded{% endif %}" href="/accounts">
            <i class="bi bi-bank"></i> Счета
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {% if '/assets' in request.url.path %}active bg-secondary rounded{% endif %}" href="/assets">
            <i class="bi bi-briefcase"></i> Активы
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {% if '/transactions' in request.url.path %}active bg-secondary rounded{% endif %}" href="/transactions">
            <i class="bi bi-arrow-left-right"></i> Транзакции
          </a>
        </li>
        <li class="nav-item mt-3">
          <a class="nav-link text-white {% if '/import' in request.url.path %}active bg-secondary rounded{% endif %}" href="/import">
            <i class="bi bi-cloud-upload"></i> Импорт
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="flex-grow-1 p-4" style="min-height: 100vh; background: #f8f9fa;">
      <div id="alert-area"></div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
