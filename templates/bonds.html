{% extends "base.html" %}
{% block title %}Облигации{% endblock %}

{% block content %}
<h2 class="mb-4">Облигации</h2>

<div class="row g-3 mb-4">
  <div class="col-12">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Обзор позиций</h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Тикер</th><th>Название</th><th>Кол-во</th><th>Купон</th>
                <th>Ставка %</th><th>Дата погашения</th><th>Дата оферты</th><th>Амортиз.</th>
              </tr>
            </thead>
            <tbody id="bonds-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Bond Ladder</h5>
        <canvas id="bondLadderChart" height="280"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Купонный календарь (12 мес.)</h5>
        <div class="table-responsive" style="max-height:320px;overflow-y:auto;">
          <table class="table table-sm table-hover">
            <thead class="table-light sticky-top">
              <tr><th>Дата</th><th>Тикер</th><th>Сумма</th><th>Валюта</th></tr>
            </thead>
            <tbody id="bond-coupon-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const fmt = v => v==null?'—':new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(v);

async function loadBonds() {
  const [assets, holdings, ladder, coupons] = await Promise.all([
    fetch('/api/assets?asset_class=bond_gov').then(r=>r.json()).catch(()=>[])
      .then(async gov => {
        const corp = await fetch('/api/assets?asset_class=bond_corp').then(r=>r.json()).catch(()=>[]);
        const muni = await fetch('/api/assets?asset_class=bond_muni').then(r=>r.json()).catch(()=>[]);
        return [...gov, ...corp, ...muni];
      }),
    fetch('/api/analytics/holdings').then(r=>r.json()).catch(()=>({})),
    fetch('/api/analytics/bond-ladder').then(r=>r.json()).catch(()=>[]),
    fetch('/api/analytics/coupon-schedule?months_ahead=12').then(r=>r.json()).catch(()=>[]),
  ]);

  // Load bond info for each ticker
  const biMap = {};
  await Promise.all(assets.map(async a => {
    try {
      const bi = await fetch(`/api/assets/${a.ticker}/bond-info`).then(r=>r.ok?r.json():null);
      if (bi) biMap[a.ticker] = bi;
    } catch {}
  }));

  // Bonds table
  const tbody = document.getElementById('bonds-table');
  assets.forEach(a => {
    const bi = biMap[a.ticker]||{};
    const h = holdings[a.ticker]||{};
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><strong>${a.ticker}</strong></td><td>${a.name}</td>
      <td>${fmt(h.quantity)}</td>
      <td>${fmt(bi.coupon_sum)} ${bi.coupon_currency||''}</td>
      <td>${bi.coupon_rate!=null?(bi.coupon_rate+'%'):'—'}</td>
      <td>${bi.maturity_date||'—'}</td><td>${bi.offer_date||'—'}</td>
      <td>${bi.is_amortizing?'Да':'Нет'}</td>`;
    tbody.appendChild(tr);
  });

  // Bond ladder chart
  const yearMap = {};
  ladder.forEach(r => { yearMap[r.year] = (yearMap[r.year]||0) + r.amount; });
  const years = Object.keys(yearMap).sort();
  new Chart(document.getElementById('bondLadderChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: years,
      datasets: [{ label: 'Номинал', data: years.map(y=>yearMap[y]), backgroundColor: 'rgba(25,135,84,0.7)' }]
    },
    options: { scales: { y: { beginAtZero: true } } }
  });

  // Coupon calendar
  const ctbody = document.getElementById('bond-coupon-table');
  coupons.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${c.date}</td><td>${c.ticker}</td><td>${fmt(c.amount)}</td><td>${c.currency}</td>`;
    ctbody.appendChild(tr);
  });
}

loadBonds();
</script>
{% endblock %}
